# 這個 workflow 會接手指定 issue，執行 Copilot CLI，並把結果回寫到 issue comment 與 issue branch。
# 注意：整個流程直接跑在 GitHub Actions runner 上，這份 YAML 本身沒有使用 Docker container。
name: '🦞 執行小龍蝦任務 #N'

# 支援兩種觸發方式：
# 1. workflow_dispatch：從 GitHub Actions UI 手動填參數後執行
# 2. repository_dispatch：由外部系統帶 payload 呼叫
on:
  # 讓人可以手動啟動這個 workflow，適合排錯或由上游系統代送參數。
  workflow_dispatch:
    inputs:
      # 要處理的 GitHub issue 編號。
      issue_number:
        description: 'GitHub issue number to process'
        required: true
        type: string
      # 可選：若上游已建立進度留言，這裡可以直接指定 comment id 來沿用。
      comment_id:
        description: 'Existing issue comment ID to reuse for progress updates'
        required: false
        type: string
      user_comment_id:
        description: 'User issue comment ID used to locate artifacts/{user_comment_id}/user.md'
        required: false
        type: string
      # 可選：觸發來源，方便 workflow 內部根據不同來源調整行為或紀錄分析用。
      event_source:
        description: 'Who is triggering this workflow: cron or issue'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - cron
          - issue
      event_data:
        description: 'Additional data related to the event that triggered this workflow'
        required: false
        type: string
        default: ''
  # 讓外部 dispatcher 用 API 觸發這個 workflow。
  repository_dispatch:
    types: [coding-agent]

# Actions UI 上顯示的執行名稱，會把 issue 編號直接帶進來，方便辨識。
run-name: "🦞 執行小龍蝦 #${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"

# 避免同一個 repo + issue 同時有多個 agent 執行互相覆蓋。
concurrency:
  group: "coding-agent-${{ github.repository }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  cancel-in-progress: false

# 這個 workflow 需要能推送內容，也需要能建立/更新 issue comment。
permissions:
  contents: write
  issues: write

# 把不同 trigger 的 payload 統一整理成共用環境變數，後續 step 只要讀 env 即可。
env:
  # 統一後的 issue 編號。
  ISSUE_NUMBER: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  # 若有提供現成的 comment id，就直接更新那則留言。
  COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.comment_id || inputs.comment_id }}"
  # 這次觸發來源的使用者留言 id，用來讀取對應的 user.md。
  USER_COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.user_comment_id || inputs.user_comment_id }}"
  # 給 Copilot CLI 做 GitHub 驗證用的 token；實際權限要看 repo secrets 如何配置。
  COPILOT_GITHUB_TOKEN: "${{ secrets.COPILOT_GITHUB_TOKEN }}"
  # MemPalace 記憶宮殿路徑：指向 workspace 內部，隨 branch commit 持久化。
  MEMPALACE_PALACE_PATH: "${{ github.workspace }}/.palace"

jobs:
  # 單一主 job：在 GitHub-hosted runner 上完成驗證、執行 agent、寫回結果。
  run-agent:
    # 直接跑在 Ubuntu runner，不是以 Docker container 執行。
    runs-on: ubuntu-latest
    # 最多允許執行 90 分鐘，避免 workflow 無限卡住。
    timeout-minutes: 90

    steps:
      # 把目標 repo 檢出到 runner，後面才能切 branch、寫檔與 push。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: "issue-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
          fetch-depth: 1

      # 先把 Node.js 環境準備好，方便 CLI 或 Node-based tooling 使用。
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # MemPalace：快取 ONNX 嵌入模型（~80MB），避免每次 run 重新下載，節省約 60 秒。
      - name: Cache MemPalace ONNX 模型
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chroma-onnx-all-minilm

      # MemPalace：安裝套件（已快取 ONNX 時約 10 秒，首次約 60 秒）。
      - name: 安裝 MemPalace
        run: pip install mempalace -q


      - name: 狀態更新處理
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data == 'StatusUpdate') || inputs.event_data == 'StatusUpdate' }}
        shell: bash
        run: |
          echo "StatusUpdate event detected, performing status update..."

      # MemPalace：執行任務前，以本次 user.md 內容為關鍵字搜尋相關歷史記憶，產生 context.md 供注入提示詞。
      - name: 讀取相關記憶
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data != 'StatusUpdate') || inputs.event_data != 'StatusUpdate' }}
        shell: bash
        run: |
          USER_MD="artifacts/${{ env.USER_COMMENT_ID }}/user.md"
          if [[ -f "$USER_MD" ]]; then
            QUERY=$(cat "$USER_MD")
            mempalace search "$QUERY" > context.md || true
          else
            echo "user.md 尚未就緒，跳過記憶讀取" >&2
          fi

      - name: 執行任務
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data != 'StatusUpdate') || inputs.event_data != 'StatusUpdate' }}
        id: copilot_task
        shell: bash
        env:
          COPILOT_GITHUB_TOKEN: ${{ env.COPILOT_GITHUB_TOKEN }}
          COPILOT_HOME: ".copilot"
        run: |
          RAW_ISSUE_NUMBER='${{ env.ISSUE_NUMBER }}'
          RAW_COMMENT_ID='${{ env.COMMENT_ID }}'
          RAW_USER_COMMENT_ID='${{ env.USER_COMMENT_ID }}'

          ISSUE_NUMBER="${RAW_ISSUE_NUMBER%\"}"
          ISSUE_NUMBER="${ISSUE_NUMBER#\"}"
          COMMENT_ID="${RAW_COMMENT_ID%\"}"
          COMMENT_ID="${COMMENT_ID#\"}"
          USER_COMMENT_ID="${RAW_USER_COMMENT_ID%\"}"
          USER_COMMENT_ID="${USER_COMMENT_ID#\"}"

          if [[ -z "$COMMENT_ID" || -z "$USER_COMMENT_ID" ]]; then
            echo "COMMENT_ID or USER_COMMENT_ID is missing"
            exit 1
          fi

          mkdir -p "artifacts/${COMMENT_ID}"

          git fetch origin "issue-${ISSUE_NUMBER}" --depth=1
          git checkout -B "issue-${ISSUE_NUMBER}" "origin/issue-${ISSUE_NUMBER}"

          USER_PROMPT_FILE="artifacts/${USER_COMMENT_ID}/user.md"
          for attempt in {1..10}; do
            if [[ -f "$USER_PROMPT_FILE" ]]; then
              break
            fi
            echo "Waiting for $USER_PROMPT_FILE (attempt ${attempt}/10)"
            git fetch origin "issue-${ISSUE_NUMBER}" --depth=1
            git reset --hard "origin/issue-${ISSUE_NUMBER}"
            sleep 2
          done

          if [[ ! -f "$USER_PROMPT_FILE" ]]; then
            echo "Missing user prompt file: $USER_PROMPT_FILE"
            ls -la artifacts || true
            find artifacts -maxdepth 2 -type f | sort || true
            exit 1
          fi

          USER_PROMPT_CONTENT="$(cat "$USER_PROMPT_FILE")"

          # 注入 MemPalace 喚醒上下文（若 context.md 存在則前置，否則原樣執行）
          MEMORY=$(cat context.md 2>/dev/null || echo "")
          BASE_PROMPT="請將最終結果寫入 artifacts/${COMMENT_ID}/result.md 。我的提示詞為: ${USER_PROMPT_CONTENT}"
          if [[ -n "$MEMORY" ]]; then
            PROMPT=$(printf '%s\n\n---\n\n%s' "$MEMORY" "$BASE_PROMPT")
          else
            PROMPT="$BASE_PROMPT"
          fi

          npx -y @github/copilot@${{ vars.COPILOT_CLI_VERSION || '1.0.18' }} \
            -p "$PROMPT" \
            --yolo --stream off --continue --output-format json \
            > "artifacts/${COMMENT_ID}/output.jsonl" \
            2> "artifacts/${COMMENT_ID}/error.log"

      # MemPalace：任務完成後挖礦（含 .log/.jsonl 不轉檔），Palace commit 回 branch 持久化。
      # Palace 存於 $MEMPALACE_PALACE_PATH（.palace/），git add -A 時自動 commit，下次執行即可還原記憶。
      - name: 更新記憶 Palace
        if: always()
        shell: bash
        run: |
          echo "" | mempalace init "$GITHUB_WORKSPACE" --yes
          python3 - <<'EOF'
          import os
          import mempalace.miner as _m
          _m.READABLE_EXTENSIONS |= {'.log', '.jsonl'}
          from mempalace.config import MempalaceConfig
          from mempalace.miner import mine
          cfg = MempalaceConfig()
          mine(
              project_dir=os.environ['GITHUB_WORKSPACE'],
              palace_path=cfg.palace_path,
              wing_override='mygithubclaw',
              agent='小龍蝦',
          )
          EOF

      - name: 推送結果
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update results for issue #${{ env.ISSUE_NUMBER }}"
          fi
          git push origin "issue-${{ env.ISSUE_NUMBER }}" --force

      - name: 任務失敗處理
        if: failure() && steps.copilot_task.conclusion == 'failure'
        uses: duotify/GitHubClawToolkit/actions/error-handler-action@v1.1.3
        with:
          output_file: artifacts/${{ env.COMMENT_ID }}/error.log
          result_file: artifacts/${{ env.COMMENT_ID }}/result.md


      - name: 執行結果回報
        if: always()
        uses: duotify/GitHubClawToolkit/actions/update-comment-action@v1.1.3
        with:
          issue_number: ${{ env.ISSUE_NUMBER }}
          comment_id: ${{ env.COMMENT_ID }}
          message_file: artifacts/${{ env.COMMENT_ID }}/result.md
